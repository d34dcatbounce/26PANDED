<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPANDED - PROTOTYPE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #050505;
            --theme-color: #FF007F;
            --gray-color: #444444;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            transition: background-color 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* 핫핑크 배경 전환 클래스 */
        body.active-bg { background-color: var(--theme-color); }

        /* 가이드 텍스트 */
        #guide {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; color: white; opacity: 0.6;
            font-family: 'Syncopate'; pointer-events: none; z-index: 100;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="guide">CLICK THE PINK CIRCLE TO START</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body } = Matter;

    // 1. 엔진 및 렌더러 설정
    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false, // 도형 색상을 보기 위해 false
            background: 'transparent'
        }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // 바닥 생성 (화면 밖)
    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
    Composite.add(engine.world, ground);

    // 2. 초기 상태: 왼쪽 핫핑크 클리커 생성
    const triggerBtn = Bodies.circle(150, window.innerHeight/2, 60, {
        isStatic: true,
        label: 'trigger',
        render: { fillStyle: '#FF007F' }
    });
    Composite.add(engine.world, triggerBtn);

    // 마우스 제어 추가
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });
    Composite.add(engine.world, mouseConstraint);

    let step = 0; // 0: 시작전, 1: 간판등장, 2: 간판추락, 3: 사진비산
    let signs = [];

    // 3. 클릭 이벤트 핸들러
    Events.on(mouseConstraint, "mousedown", function(event) {
        const clickedBody = event.source.body;

        // STEP 1: 왼쪽 버튼 클릭 -> 배경 바뀌고 간판 4개 등장
        if (step === 0 && clickedBody === triggerBtn) {
            document.body.classList.add('active-bg');
            document.getElementById('guide').innerText = "CLICK ANYWHERE TO DROP SIGNS";
            Composite.remove(engine.world, triggerBtn);
            spawnSigns();
            step = 1;
        } 
        // STEP 2: 화면 클릭 -> 3개 추락, 1개 남음
        else if (step === 1) {
            dropThreeSigns();
            document.getElementById('guide').innerText = "CLICK THE REMAINING SIGN";
            step = 2;
        }
        // STEP 3: 남은 간판 클릭 -> 사진 흩뿌리기
        else if (step === 2 && signs.includes(clickedBody) && clickedBody.isStatic) {
            scatterPhotos(clickedBody.position.x, clickedBody.position.y);
            Composite.remove(engine.world, clickedBody);
            document.getElementById('guide').innerText = "EXPANDED SUCCESS";
            step = 3;
        }
    });

    // --- 기능 함수들 ---

    function spawnSigns() {
        const colors = ['#ffffff', '#ffffff', '#ffffff', '#ffffff'];
        for (let i = 0; i < 4; i++) {
            const x = (window.innerWidth / 5) * (i + 1);
            const sign = Bodies.rectangle(x, 200, 180, 90, {
                isStatic: true,
                render: { fillStyle: '#ffffff', strokeStyle: '#000', lineWidth: 2 }
            });
            signs.push(sign);
            Composite.add(engine.world, sign);
        }
    }

    function dropThreeSigns() {
        // 앞의 3개는 물리 적용(isStatic = false) 및 색상 변경(흑백)
        for (let i = 0; i < 3; i++) {
            signs[i].isStatic = false;
            signs[i].render.fillStyle = '#444444'; // 흑백 느낌
            // 약간의 회전 랜덤 부여
            Body.setAngularVelocity(signs[i], (Math.random() - 0.5) * 0.2);
        }
    }

    function scatterPhotos(startX, startY) {
        for (let i = 0; i < 15; i++) {
            const photo = Bodies.rectangle(startX, startY, 60, 80, {
                frictionAir: 0.05,
                render: { fillStyle: '#eee' } // 임시 사진 도형
            });
            
            Composite.add(engine.world, photo);

            // 사방으로 튀어나가는 힘 부여
            const forceMagnitude = 0.05 * photo.mass;
            Body.applyForce(photo, photo.position, {
                x: (Math.random() - 0.5) * forceMagnitude,
                y: (Math.random() - 0.5) * forceMagnitude
            });
        }
    }

    // 윈도우 리사이즈 대응
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
    });

</script>
</body>
</html>
