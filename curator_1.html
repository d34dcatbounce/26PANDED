<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPANDED - CURATOR 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght=700&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #050505;
            --theme-color: #FF007F;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            transition: background-color 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body.active-bg { background-color: var(--theme-color); }

        /* 가이드 텍스트 */
        #guide {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; color: white; opacity: 0.6;
            font-family: 'Syncopate'; pointer-events: none; z-index: 100;
        }

        /* 확대된 사진을 보여줄 모달(오버레이) */
        #zoom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 999;
        }
        #zoom-modal.show { opacity: 1; pointer-events: auto; cursor: zoom-out; }
        
        #zoomed-photo {
            width: 300px; height: 400px; background-color: white;
            border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.5);
        }
        #zoom-modal.show #zoomed-photo { transform: scale(1); }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="guide">CLICK THE PINK CIRCLE TO START</div>

<div id="zoom-modal" onclick="closeZoom()">
    <div id="zoomed-photo"></div>
    <p style="color: white; margin-top: 20px; font-family: 'Space Grotesk'; letter-spacing: 2px;">CLICK ANYWHERE TO CLOSE</p>
</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body, Query } = Matter;

    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false, // 도형 색상을 보기 위해 false
            background: 'transparent'
        }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // 1. *** 수정 부분 *** 사진들이 튕겨도 화면 밖으로 안 나가게 화면 전체 경계벽 강화
    const wallOptions = { isStatic: true, render: { visible: false } };
    const wallThickness = 500; // 벽 두께를 500px로 대폭 늘려 빠른 속도의 객체도 감지하도록 함

    Composite.add(engine.world, [
        // 바닥
        Bodies.rectangle(window.innerWidth/2, window.innerHeight + wallThickness/2, window.innerWidth, wallThickness, wallOptions),
        // 상단 (위로 튀는 것 방지)
        Bodies.rectangle(window.innerWidth/2, -wallThickness/2, window.innerWidth, wallThickness, wallOptions),
        // 왼쪽
        Bodies.rectangle(-wallThickness/2, window.innerHeight/2, wallThickness, window.innerHeight, wallOptions),
        // 오른쪽
        Bodies.rectangle(window.innerWidth + wallThickness/2, window.innerHeight/2, wallThickness, window.innerHeight, wallOptions)
    ]);

    // 2. 초기 핫핑크 버튼
    const triggerBtn = Bodies.circle(150, window.innerHeight/2, 60, {
        isStatic: true, label: 'trigger', render: { fillStyle: '#FF007F' }
    });
    Composite.add(engine.world, triggerBtn);

    // 마우스 제어 (드래그 앤 드롭 지원)
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.2, render: { visible: false } }
    });
    Composite.add(engine.world, mouseConstraint);

    let step = 0; 
    let signs = [];
    
    // 사진 구분을 위한 다양한 색상 배열
    const photoColors = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00F5D4', '#9B5DE5', '#FEE440', '#00BBF9'];

    // 드래그와 클릭을 구분하기 위한 변수
    let mousedownPosition = { x: 0, y: 0 };

    // 마우스 누를 때 위치 저장
    Events.on(mouseConstraint, "mousedown", function(event) {
        mousedownPosition = { x: event.mouse.position.x, y: event.mouse.position.y };
        
        const clickedBody = event.source.body;
        
        // STEP 1: 시작 버튼 클릭
        if (step === 0 && clickedBody === triggerBtn) {
            document.body.classList.add('active-bg');
            document.getElementById('guide').innerText = "CLICK ANYWHERE TO DROP SIGNS";
            Composite.remove(engine.world, triggerBtn);
            spawnSigns();
            step = 1;
        } 
        // STEP 2: 빈 화면 클릭 -> 간판 추락
        else if (step === 1 && !clickedBody) {
            dropThreeSigns();
            document.getElementById('guide').innerText = "CLICK THE REMAINING SIGN";
            step = 2;
        }
        // STEP 3: 남은 1개 간판 클릭 -> 사진 흩뿌리기
        else if (step === 2 && signs.includes(clickedBody) && clickedBody.isStatic) {
            scatterPhotos(clickedBody.position.x, clickedBody.position.y);
            Composite.remove(engine.world, clickedBody);
            document.getElementById('guide').innerText = "DRAG TO MOVE / CLICK TO ZOOM";
            step = 3;
        }
    });

    // 마우스 뗄 때 (클릭 vs 드래그 판별 및 사진 확대)
    Events.on(mouseConstraint, "mouseup", function(event) {
        if (step !== 3) return; // 사진이 뿌려진 상태에서만 작동

        const mouseX = event.mouse.position.x;
        const mouseY = event.mouse.position.y;
        
        // 마우스를 누른 위치와 뗀 위치의 거리를 계산 (거리가 짧으면 클릭으로 인정)
        const dist = Math.hypot(mouseX - mousedownPosition.x, mouseY - mousedownPosition.y);
        
        if (dist < 10) { 
            // 현재 클릭한 좌표에 있는 모든 객체 찾기
            const bodiesUnderMouse = Query.point(Composite.allBodies(engine.world), event.mouse.position);
            
            // 사진들만 필터링
            const photosUnderMouse = bodiesUnderMouse.filter(b => b.label === 'photo');
            
            if (photosUnderMouse.length > 0) {
                // 배열의 맨 마지막 요소가 화면상 제일 위에 렌더링된 객체임
                const topMostPhoto = photosUnderMouse[photosUnderMouse.length - 1];
                openZoom(topMostPhoto.render.fillStyle);
            }
        }
    });

    // --- 기능 함수들 ---

    function spawnSigns() {
        for (let i = 0; i < 4; i++) {
            const x = (window.innerWidth / 5) * (i + 1);
            const sign = Bodies.rectangle(x, 200, 180, 90, {
                isStatic: true,
                render: { fillStyle: '#ffffff', strokeStyle: '#000', lineWidth: 2 }
            });
            signs.push(sign);
            Composite.add(engine.world, sign);
        }
    }

    function dropThreeSigns() {
        for (let i = 0; i < 3; i++) {
            const sign = signs[i];
            sign.isStatic = false; // 정적 고정 해제
            sign.render.fillStyle = '#444444'; // 색상 변경

            // *** 수정 부분 ***
            // 바닥 벽과 충돌하지 않고 뚫고 떨어지도록 충돌 필터 해제 코드를 삭제함.
            // 기본값으로 돌려 바닥 벽(isStatic: true)과 충돌하게 함.

            // 아래쪽으로 힘을 가해 '쓩' 떨어지게 만듦 (이미 충분히 빠르므로 힘을 유지)
            Body.applyForce(sign, sign.position, { x: 0, y: 0.5 });
            Body.setAngularVelocity(sign, (Math.random() - 0.5) * 0.3);
        }
    }

    function scatterPhotos(startX, startY) {
        for (let i = 0; i < 15; i++) {
            const randomColor = photoColors[i % photoColors.length];
            const photo = Bodies.rectangle(startX, startY, 70, 100, {
                label: 'photo', // 구분을 위한 라벨
                frictionAir: 0.03, // 공기 저항
                restitution: 0.6, // 통통 튀는 탄성
                render: { fillStyle: randomColor } 
            });
            
            Composite.add(engine.world, photo);

            // 사방으로 폭발하듯 튀어나가는 강한 힘 부여
            const forceMagnitude = 0.08 * photo.mass;
            Body.applyForce(photo, photo.position, {
                x: (Math.random() - 0.5) * forceMagnitude,
                y: (Math.random() - 0.5) * forceMagnitude
            });
        }
    }

    // 사진 확대 모달 열기
    function openZoom(color) {
        const modal = document.getElementById('zoom-modal');
        const zoomedPhoto = document.getElementById('zoomed-photo');
        zoomedPhoto.style.backgroundColor = color; // 클릭한 사진의 색상을 모달에 반영
        modal.classList.add('show');
    }

    // 사진 확대 모달 닫기
    function closeZoom() {
        const modal = document.getElementById('zoom-modal');
        modal.classList.remove('show');
    }

    // 윈도우 리사이즈 대응
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
    });

</script>
</body>
</html>
