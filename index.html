<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED 3D Network (Data Diving)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F;
    --neon-pink-dim: rgba(255, 0, 127, 0.4);
  }

  body {
    margin: 0;
    overflow: hidden; 
    background-color: var(--bg-color);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    perspective: 1200px; 
    perspective-origin: 50% 55vh; 
    /* 배경색 전환을 위한 트랜지션 */
    transition: background-color 1s ease;
  }

  /* 디테일 뷰(개인 공간)로 들어갔을 때의 배경 */
  body.detail-mode {
    background-color: #110008; /* 아주 어두운 자줏빛/핑크빛 배경으로 전환 */
  }

  header {
    position: absolute;
    top: 30px;
    left: 40px;
    right: 60px; 
    z-index: 10;
    pointer-events: none; 
    display: flex;
    align-items: center;
    justify-content: space-between; 
  }

  .brand { display: flex; align-items: center; }

  .logo {
    width: 40px; height: 40px;
    background-color: transparent;
    border: 2px solid var(--neon-pink);
    border-radius: 50%; margin-right: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo::before {
    content: 'EP'; font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink); font-size: 1.2rem; font-weight: 700;
  }

  h1 {
    font-family: 'Syncopate', sans-serif; color: var(--neon-pink);
    font-size: 2.5rem; margin: 0; text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 20px var(--neon-pink-dim);
    letter-spacing: 2px;
  }

  .top-menu { display: flex; gap: 40px; pointer-events: auto; }
  .menu-item {
    font-family: 'Syncopate', sans-serif; font-size: 1.5rem; color: rgba(255, 255, 255, 0.5);
    text-decoration: none; display: flex; align-items: flex-end; transition: color 0.3s, text-shadow 0.3s;
  }
  .menu-item.active, .menu-item:hover { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
  .menu-item .rest {
    font-size: 1rem; max-width: 0; opacity: 0; overflow: hidden; white-space: nowrap;
    transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; letter-spacing: 2px; padding-bottom: 2px; 
  }
  .menu-item:hover .rest { max-width: 150px; opacity: 1; margin-left: 2px; }

  #scene {
    position: absolute; top: 55vh; left: 50vw; width: 0; height: 0;
    transform-style: preserve-3d; cursor: grab;
  }
  #scene:active { cursor: grabbing; }

  .line3d {
    position: absolute; top: 0; left: 0; height: 2px; 
    transform-style: preserve-3d; pointer-events: none; transform-origin: center center;
    transition: opacity 0.8s ease; /* 서서히 사라지는 효과 */
  }
  .line3d .plane {
    position: absolute; width: 100%; height: 100%; background-color: var(--neon-pink); opacity: 0.6; 
  }
  .line3d .plane.cross { transform: rotateX(90deg); }

  .node-wrapper {
    position: absolute; top: 0; left: 0; width: 0; height: 0; transform-style: preserve-3d; z-index: 2;
    transition: opacity 0.8s ease; /* 서서히 사라지는 효과 */
  }
  .node {
    position: absolute; width: 26px; height: 26px; background-color: var(--bg-color);
    border: 2px solid var(--neon-pink); border-radius: 50%; transform: translate(-50%, -50%); 
    cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1); display: flex; align-items: center; justify-content: center;
  }
  .node::after {
    content: ''; width: 8px; height: 8px; background-color: var(--neon-pink); border-radius: 50%; transition: all 0.3s ease;
  }
  .node-wrapper:hover .node, .node.active-highlight {
    transform: translate(-50%, -50%) scale(2); background-color: var(--neon-pink); border-color: #fff;
    box-shadow: 0 0 40px var(--neon-pink), 0 0 15px white; z-index: 10;
  }
  .node-wrapper:hover .node::after, .node.active-highlight::after { background-color: var(--bg-color); }

  .label {
    position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem;
    white-space: nowrap; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.9); font-weight: 700;
  }
  .node-wrapper:hover .label, .node-wrapper.active-wrapper .label { opacity: 1; color: var(--neon-pink); }

  #curator-list {
    position: fixed; right: 40px; top: 50vh; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; text-align: right;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .list-item {
    color: rgba(255, 255, 255, 0.4); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.3s ease; padding: 5px 0; position: relative;
  }
  .list-item:hover, .list-item.active { color: var(--neon-pink); transform: translateX(-10px); }
  .list-item::after {
    content: ''; position: absolute; right: -15px; top: 50%; transform: translateY(-50%); width: 0px; height: 2px;
    background-color: var(--neon-pink); transition: width 0.3s ease;
  }
  .list-item:hover::after, .list-item.active::after { width: 10px; }

  /* --- [새로 추가됨] 개인 클리커 (작품 상징물) 스타일 --- */
  .clicker-wrapper {
    position: absolute; top: 0; left: 0; width: 0; height: 0; transform-style: preserve-3d;
    opacity: 0; /* 평소엔 투명하게 은닉 */
    pointer-events: none; /* 클릭 방지 */
    transition: opacity 1s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* 클리커가 화면에 불려나왔을 때 (호출됨) */
  .clicker-wrapper.summoned {
    opacity: 1;
    pointer-events: auto; /* 클릭 활성화 */
  }

  /* 클리커 디자인 (마름모 꼴 네온) */
  .clicker {
    position: absolute;
    width: 60px; height: 60px;
    border: 2px dashed var(--neon-pink);
    transform: translate(-50%, -50%) rotate(45deg); /* 마름모 형태 */
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: rgba(255, 0, 127, 0.05);
    transition: all 0.3s ease;
    box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.2), 0 0 15px rgba(255, 0, 127, 0.2);
  }
  
  .clicker:hover {
    background: rgba(255, 0, 127, 0.3);
    box-shadow: inset 0 0 30px var(--neon-pink), 0 0 30px var(--neon-pink);
    transform: translate(-50%, -50%) rotate(135deg) scale(1.1); /* 호버 시 회전하며 커짐 */
  }

  .clicker-label {
    position: absolute;
    transform: rotate(-45deg); /* 부모가 45도 돌아갔으므로 글자는 역으로 돌려 수평 맞춤 */
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
    text-shadow: 0 0 5px black;
  }
  /* ------------------------------------------------ */

  /* 뒤로가기 버튼 */
  #back-btn {
    position: fixed; bottom: 40px; right: 40px;
    font-family: 'Syncopate', sans-serif; font-size: 1rem; color: var(--neon-pink);
    background: transparent; border: 1px solid var(--neon-pink); padding: 10px 20px;
    cursor: pointer; opacity: 0; pointer-events: none; transition: all 0.5s ease;
    z-index: 200; transform: translateY(20px);
  }
  #back-btn.show {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  #back-btn:hover {
    background: var(--neon-pink); color: var(--bg-color); box-shadow: 0 0 20px var(--neon-pink);
  }

</style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="logo"></div>
      <h1>EXPANDED</h1>
    </div>
    <nav class="top-menu">
      <a href="#" class="menu-item active">A<span class="rest">CTIVITY</span></a>
      <a href="#" class="menu-item">A<span class="rest">RCHIVE</span></a>
      <a href="#" class="menu-item">A<span class="rest">BOUT</span></a>
    </nav>
  </header>

  <div id="scene"></div>
  <div id="curator-list"></div>
  
  <button id="back-btn">RETURN TO NETWORK</button>

<script>
  const scene = document.getElementById('scene');
  const curatorList = document.getElementById('curator-list');
  const backBtn = document.getElementById('back-btn');
  const totalCurators = 16;
  const nodes = [];
  const clickers = []; // 모든 클리커를 담아둘 배열

  // 현재 뷰 상태 (네트워크 뷰 vs 디테일 뷰)
  let currentMode = 'network'; 

  function generateNetwork3D() {
    for (let i = 0; i < totalCurators; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 600 + (Math.random() * 400); 
      const y = (Math.random() - 0.5) * 800; 

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      
      nodes.push({ id: i, x: x, y: y, z: z });

      const wrapperDiv = document.createElement('div');
      wrapperDiv.classList.add('node-wrapper');
      wrapperDiv.id = `node-${i}`;
      
      const nodeDiv = document.createElement('div');
      nodeDiv.classList.add('node');

      const labelDiv = document.createElement('div');
      labelDiv.classList.add('label');
      labelDiv.textContent = `Curator ${i + 1}`;
      
      wrapperDiv.appendChild(nodeDiv);
      wrapperDiv.appendChild(labelDiv);

      wrapperDiv.addEventListener('mousedown', e => e.stopPropagation()); 
      scene.appendChild(wrapperDiv);

      const listItem = document.createElement('div');
      listItem.className = 'list-item';
      listItem.textContent = `CURATOR ${i + 1}`;
      
      listItem.addEventListener('mouseenter', () => {
        if(currentMode !== 'network') return;
        nodeDiv.classList.add('active-highlight');
        wrapperDiv.classList.add('active-wrapper');
      });

      listItem.addEventListener('mouseleave', () => {
        nodeDiv.classList.remove('active-highlight');
        wrapperDiv.classList.remove('active-wrapper');
      });

      // 노드나 리스트 클릭 시 해당 공간으로 다이빙
      const diveIntoCurator = () => {
        if(currentMode === 'network') diveIntoSpace(i);
      };
      
      wrapperDiv.addEventListener('click', diveIntoCurator);
      listItem.addEventListener('click', diveIntoCurator);
      curatorList.appendChild(listItem);

      // --- [새로 추가됨] 큐레이터당 3개의 클리커 사전 생성 및 은닉 ---
      for(let j=0; j<3; j++) {
        const cWrapper = document.createElement('div');
        cWrapper.classList.add('clicker-wrapper');
        // 추후 찾기 쉽도록 data 속성 부여
        cWrapper.dataset.ownerId = i;
        
        const clickerBox = document.createElement('div');
        clickerBox.classList.add('clicker');
        
        const clickerLabel = document.createElement('span');
        clickerLabel.classList.add('clicker-label');
        clickerLabel.textContent = `PJT 0${j+1}`;

        clickerBox.appendChild(clickerLabel);
        cWrapper.appendChild(clickerBox);
        scene.appendChild(cWrapper);
        
        clickers.push(cWrapper);
      }
    }

    // 선 그리기
    for (let i = 0; i < totalCurators; i++) {
      const target1 = (i + 1) % totalCurators;
      const target2 = (i + 4) % totalCurators; 
      drawLine3D(nodes[i], nodes[target1]);
      drawLine3D(nodes[i], nodes[target2]);
    }
  }

  function drawLine3D(p1, p2) {
    const dx = p2.x - p1.x; const dy = p2.y - p1.y; const dz = p2.z - p1.z;
    const length = Math.hypot(dx, dy, dz);
    const cx = (p1.x + p2.x) / 2; const cy = (p1.y + p2.y) / 2; const cz = (p1.z + p2.z) / 2;
    const rotY = Math.atan2(-dz, dx) * (180 / Math.PI);
    const rotZ = Math.atan2(dy, Math.hypot(dx, dz)) * (180 / Math.PI);

    const line = document.createElement('div');
    line.classList.add('line3d');
    line.style.width = `${length}px`;
    line.style.transform = `translate3d(calc(-50% + ${cx}px), calc(-50% + ${cy}px), ${cz}px) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
    
    const plane1 = document.createElement('div'); plane1.classList.add('plane');
    const plane2 = document.createElement('div'); plane2.classList.add('plane', 'cross');

    line.appendChild(plane1); line.appendChild(plane2);
    scene.appendChild(line);
  }

  generateNetwork3D();

  let isDragging = false;
  let previousX = 0, previousY = 0;
  let rotationX = 20, rotationY = -30;
  
  let currentZoom = -500;
  const MIN_ZOOM = -2500; const MAX_ZOOM = 1000; const ZOOM_SPEED = 1.5; 

  let isAutoRotating = false;
  let targetRotX = null, targetRotY = null;
  let divingTargetId = -1;

  function updateTransform() {
    scene.style.transform = `translateZ(${currentZoom}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
    
    // 빌보딩 처리 (클리커 포함)
    document.querySelectorAll('.node-wrapper, .clicker-wrapper').forEach((el) => {
      // 위치 좌표 추출 (transform 속성에서 translate3d 값 파싱)
      const transformStr = el.style.transform;
      if(transformStr && transformStr.includes('translate3d')) {
         const match = transformStr.match(/translate3d\(([^,]+), ([^,]+), ([^)]+)\)/);
         if(match) {
           const x = match[1], y = match[2], z = match[3];
           el.style.transform = `translate3d(${x}, ${y}, ${z}) rotateY(${-rotationY}deg) rotateX(${-rotationX}deg)`;
         }
      }
    });
  }

  updateTransform();

  // --- [핵심 로직] 특정 큐레이터의 공간으로 다이빙 ---
  function diveIntoSpace(nodeIndex) {
    if(currentMode === 'detail') return;
    currentMode = 'detail';
    document.body.classList.add('detail-mode'); // 배경 어둡게
    
    const node = nodes[nodeIndex];
    
    // 1. 카메라를 해당 노드 쪽으로 회전시킴
    let targetY = -Math.atan2(node.x, node.z) * (180 / Math.PI);
    let targetX = Math.atan2(node.y, Math.hypot(node.x, node.z)) * (180 / Math.PI);

    let currentY = rotationY % 360; if (currentY < 0) currentY += 360; 
    let ty = targetY % 360; if (ty < 0) ty += 360;
    let diffY = ty - currentY;
    if (diffY > 180) diffY -= 360; if (diffY < -180) diffY += 360;

    targetRotY = rotationY + diffY;
    targetRotX = targetX;

    divingTargetId = nodeIndex;
    isAutoRotating = true;
    animateRotation();

    // 2. 다른 요소들 숨기기 (선, 안 쓰는 노드, 우측 리스트)
    document.querySelectorAll('.line3d').forEach(el => el.style.opacity = '0');
    document.querySelectorAll('.node-wrapper').forEach(el => {
      if(el.id !== `node-${nodeIndex}`) el.style.opacity = '0.1'; // 선택 안된 노드는 희미하게
    });
    curatorList.style.opacity = '0';
    curatorList.style.transform = 'translateY(-50%) translateX(50px)';
    
    backBtn.classList.add('show');
  }

  // 공간 다이빙 애니메이션
  function animateRotation() {
    if (!isAutoRotating) return;
    rotationX += (targetRotX - rotationX) * 0.08;
    rotationY += (targetRotY - rotationY) * 0.08;
    
    // 줌인 효과 (해당 노드로 다가감)
    if(currentMode === 'detail') {
        currentZoom += (400 - currentZoom) * 0.05; // 400 근처까지 줌인
    }

    updateTransform();

    if (Math.abs(targetRotX - rotationX) < 0.1 && Math.abs(targetRotY - rotationY) < 0.1) {
      isAutoRotating = false;
      if(currentMode === 'detail') {
          summonClickers(divingTargetId); // 회전/줌이 끝나면 클리커 소환
      }
    } else {
      requestAnimationFrame(animateRotation);
    }
  }

  // --- [핵심 로직] 숨겨둔 클리커들 화면에 뿌리기 ---
  function summonClickers(ownerId) {
    const ownerNode = nodes[ownerId];
    
    // 해당 주인의 클리커만 필터링
    const myClickers = clickers.filter(c => c.dataset.ownerId == ownerId);
    
    myClickers.forEach((clicker, index) => {
      // 120도 간격으로 중심(ownerNode) 주변에 삼각형 형태로 배치
      const angle = (index * (Math.PI * 2) / 3);
      const orbitRadius = 150; // 노드 주변으로 퍼지는 반경
      
      // 카메라 평면(빌보드) 상에서의 분산을 위해 X, Y로 퍼뜨림
      const offsetX = Math.cos(angle) * orbitRadius;
      const offsetY = Math.sin(angle) * orbitRadius;
      
      // 노드 위치 + 오프셋 (카메라가 바라보는 평면에 맞춰 전개)
      // 정확한 3D 구면 전개는 복잡하므로, 일단 해당 노드의 3D 좌표 기준 약간 앞으로(Z) 당겨서 배치
      const finalX = ownerNode.x + offsetX;
      const finalY = ownerNode.y + offsetY;
      const finalZ = ownerNode.z + 50; // 중심 노드보다 약간 카메라 쪽으로 띄움

      // 위치 세팅 및 등장 클래스 추가
      clicker.style.transform = `translate3d(${finalX}px, ${finalY}px, ${finalZ}px) rotateY(${-rotationY}deg) rotateX(${-rotationX}deg)`;
      clicker.classList.add('summoned');
      
      // 클리커 클릭 이벤트 (원하시는 추가 작동-예: 이미지 뷰어 등-을 여기에 연결)
      clicker.onclick = () => alert(`PJT 0${index+1} 작품이 열립니다!`);
    });
  }

  // --- 네트워크로 다시 돌아가기 ---
  backBtn.addEventListener('click', () => {
    currentMode = 'network';
    document.body.classList.remove('detail-mode');
    
    // 1. 소환된 클리커들 숨기기
    clickers.forEach(c => c.classList.remove('summoned'));
    
    // 2. 네트워크 선과 노드들 복구
    document.querySelectorAll('.line3d').forEach(el => el.style.opacity = '0.6');
    document.querySelectorAll('.node-wrapper').forEach(el => el.style.opacity = '1');
    
    // 3. 우측 리스트 복구
    curatorList.style.opacity = '1';
    curatorList.style.transform = 'translateY(-50%) translateX(0)';
    
    backBtn.classList.remove('show');
    
    // 약간 줌아웃하며 원래 시야로
    const zoomOutAnim = setInterval(() => {
        currentZoom += (-500 - currentZoom) * 0.1;
        updateTransform();
        if(Math.abs(-500 - currentZoom) < 5) clearInterval(zoomOutAnim);
    }, 16);
  });

  // 이벤트 리스너들
  window.addEventListener('wheel', (e) => {
    if(currentMode === 'detail') return; // 디테일 모드에선 휠 줌 고정
    isAutoRotating = false; 
    currentZoom -= e.deltaY * ZOOM_SPEED;
    currentZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, currentZoom));
    updateTransform();
  });

  window.addEventListener('mousedown', (e) => {
    if(currentMode === 'detail') return; // 디테일 모드에선 드래그 회전 고정
    if (e.target.closest('.node-wrapper') || e.target.closest('#curator-list') || e.target.closest('.top-menu') || e.target.closest('.clicker')) return;
    
    isAutoRotating = false; 
    isDragging = true;
    previousX = e.clientX; previousY = e.clientY;
  });

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mouseleave', () => isDragging = false);

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - previousX; const deltaY = e.clientY - previousY;
    rotationY += deltaX * 0.3; rotationX -= deltaY * 0.3;
    rotationX = Math.max(-80, Math.min(80, rotationX));
    updateTransform();
    previousX = e.clientX; previousY = e.clientY;
  });

</script>
</body>
</html>
