<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED 3D Curation Network</title>
<style>
  /* 폰트 임포트 */
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F;
    --neon-pink-dim: rgba(255, 0, 127, 0.4);
    --hover-neon: #FF66CC;
  }

  body {
    margin: 0;
    overflow: hidden; /* 스크롤 방지 */
    background-color: var(--bg-color);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    /* 1. 바디에 원근감 부여 */
    perspective: 1200px; 
  }

  header {
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 10;
    pointer-events: none; /* 타이틀 영역이 마우스 드래그를 방해하지 않도록 설정 */
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 2.8rem;
    margin: 0;
    text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 25px var(--neon-pink-dim);
    letter-spacing: 3px;
  }

  /* 2. 3D 회전이 적용될 전체 컨테이너 */
  #network-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    transform-style: preserve-3d; /* 자식 요소들에게도 3D 공간 유지 */
    cursor: grab;
    /* 초기 화면 기울기 설정 */
    transform: rotateX(20deg) rotateY(-15deg); 
  }

  #network-container:active {
    cursor: grabbing;
  }

  /* SVG 도화지를 명시적으로 전체화면으로 설정 */
  #network-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    pointer-events: none; 
  }

  line {
    stroke: var(--neon-pink);
    stroke-width: 1.2;
    opacity: 0.35;
  }

  /* 큐레이터 노드 */
  .node {
    position: absolute;
    width: 22px;
    height: 22px;
    background-color: var(--bg-color);
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    transform: translate(-50%, -50%); 
    z-index: 2;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px var(--neon-pink-dim);
  }

  .node::after {
    content: '';
    width: 7px;
    height: 7px;
    background-color: var(--neon-pink);
    border-radius: 50%;
    transition: all 0.3s ease;
  }

  .node:hover {
    transform: translate(-50%, -50%) scale(1.7); /* hover 시에도 중앙 정렬 유지 */
    border-color: var(--hover-neon);
    background-color: var(--hover-neon);
    box-shadow: 0 0 35px var(--neon-pink);
  }

  .node:hover::after {
    background-color: var(--bg-color);
  }

  .label {
    position: absolute;
    top: 35px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 0.9rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    font-weight: 700;
    background-color: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .node:hover .label {
    opacity: 1;
  }
</style>
</head>
<body>

  <header>
    <h1>EXPANDED</h1>
  </header>

  <div id="network-container">
    <svg id="network-lines"></svg>
    </div>

<script>
  const container = document.getElementById('network-container');
  const svgLines = document.getElementById('network-lines');
  const totalCurators = 16;
  const nodes = [];

  const MIN_DIST_PERCENT = 10; 
  const MAX_ATTEMPTS = 100; 

  function getDistancePercent(p1, p2) {
    const dx = p1.x - p2.x;
    const dy = p1.y - p2.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // 네트워크 노드 생성 함수
  function generateNetworkOptimized() {
    let svgHTML = '';
    let curatorsCreated = 0;
    
    while (curatorsCreated < totalCurators) {
      let attempts = 0;
      let validPoint = null;

      while (attempts < MAX_ATTEMPTS) {
        const newX = 15 + Math.random() * 70; 
        const newY = 15 + Math.random() * 70;
        const candidatePoint = { x: newX, y: newY };

        let tooClose = false;
        for (const existingNode of nodes) {
          const distance = getDistancePercent(existingNode, candidatePoint);
          if (distance < MIN_DIST_PERCENT) {
            tooClose = true;
            break; 
          }
        }

        if (!tooClose) {
          validPoint = candidatePoint;
          break; 
        }
        attempts++;
      }

      if (validPoint) {
        validPoint.id = curatorsCreated + 1;
        nodes.push(validPoint);

        const nodeDiv = document.createElement('div');
        nodeDiv.classList.add('node');
        nodeDiv.style.left = `${validPoint.x}%`;
        nodeDiv.style.top = `${validPoint.y}%`;

        const labelDiv = document.createElement('div');
        labelDiv.classList.add('label');
        labelDiv.textContent = `Curator ${validPoint.id}`;
        nodeDiv.appendChild(labelDiv);

        // 노드 클릭 이벤트 (추후 모달 팝업 연결 부분)
        nodeDiv.addEventListener('mousedown', (e) => {
          e.stopPropagation(); // 클릭 시 드래그 이벤트와 겹치지 않게 방지
        });
        nodeDiv.addEventListener('click', () => {
          alert(`Curator ${validPoint.id} 공간 오픈 준비 중!`);
        });

        container.appendChild(nodeDiv);
        curatorsCreated++;
      } else {
        break; 
      }
    }

    // 선 연결 로직
    for (let i = 0; i < nodes.length; i++) {
      const target1 = (i + 1) % nodes.length;
      const target2 = (i + 4) % nodes.length; 
      
      if (nodes[target1]) {
        svgHTML += `<line x1="${nodes[i].x}%" y1="${nodes[i].y}%" x2="${nodes[target1].x}%" y2="${nodes[target1].y}%" />`;
      }
      if (nodes[target2]) {
        svgHTML += `<line x1="${nodes[i].x}%" y1="${nodes[i].y}%" x2="${nodes[target2].x}%" y2="${nodes[target2].y}%" />`;
      }
    }
    svgLines.innerHTML = svgHTML;
  }

  generateNetworkOptimized();

  // --- 3D 마우스 드래그 회전 로직 ---
  let isDragging = false;
  let previousX = 0;
  let previousY = 0;
  let rotationX = 20; 
  let rotationY = -15;

  window.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousX = e.clientX;
    previousY = e.clientY;
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    const deltaX = e.clientX - previousX;
    const deltaY = e.clientY - previousY;

    rotationY += deltaX * 0.3; 
    rotationX -= deltaY * 0.3; 

    // 상하 회전각 제한 (-80도 ~ 80도)
    rotationX = Math.max(-80, Math.min(80, rotationX));

    // 컨테이너 회전 적용
    container.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;

    previousX = e.clientX;
    previousY = e.clientY;
  });
</script>

</body>
</html>
