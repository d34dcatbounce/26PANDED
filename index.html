<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED 3D Network (Max Zoom Out & Lowered)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F;
    --neon-pink-dim: rgba(255, 0, 127, 0.4);
    --slider-track-color: #333;
  }

  body {
    margin: 0;
    overflow: hidden; 
    background-color: var(--bg-color);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    perspective: 1200px; 
  }

  header {
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  .logo {
    width: 40px;
    height: 40px;
    background-color: transparent;
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    margin-right: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .logo::before {
    content: 'EP';
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 1.2rem;
    font-weight: 700;
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 2.5rem;
    margin: 0;
    text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 20px var(--neon-pink-dim);
    letter-spacing: 2px;
  }

  #scene {
    position: absolute;
    /* [수정됨] 60vh에서 75vh로 변경하여 연결망을 화면 하단으로 훅 내림 */
    top: 75vh;  
    left: 45vw; 
    width: 0;
    height: 0;
    transform-style: preserve-3d;
    cursor: grab;
  }

  #scene:active {
    cursor: grabbing;
  }

  .line3d {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    transform-style: preserve-3d;
    pointer-events: none;
    transform-origin: center center;
  }

  .line3d .plane {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: var(--neon-pink);
    opacity: 0.35;
    box-shadow: 0 0 10px var(--neon-pink-dim);
  }
  .line3d .plane.cross {
    transform: rotateX(90deg); 
  }

  .node-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    transform-style: preserve-3d;
    z-index: 2;
  }

  .node {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: var(--bg-color);
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    transform: translate(-50%, -50%); 
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1); 
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 12px var(--neon-pink-dim);
  }

  .node::after {
    content: '';
    width: 6px;
    height: 6px;
    background-color: var(--neon-pink);
    border-radius: 50%;
    transition: all 0.3s ease;
  }

  .node-wrapper:hover .node {
    transform: translate(-50%, -50%) scale(1.6);
    background-color: var(--neon-pink);
    box-shadow: 0 0 25px var(--neon-pink);
  }

  .node-wrapper:hover .node::after {
    background-color: var(--bg-color);
  }

  .label {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 0.85rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    font-weight: 700;
  }

  .node-wrapper:hover .label {
    opacity: 1;
  }

  .zoom-control-container {
    position: fixed;
    right: 40px;
    top: 50vh;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    z-index: 100;
  }

  .slider-wrapper {
    width: 20px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #zoom-lever {
    -webkit-appearance: none;
    width: 200px; 
    height: 6px;
    background: var(--slider-track-color);
    border-radius: 3px;
    outline: none;
    transform: rotate(-90deg); 
    cursor: pointer;
    margin: 0;
  }

  #zoom-lever::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: var(--neon-pink);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 15px var(--neon-pink);
  }

  .zoom-label {
    font-family: 'Space Grotesk', sans-serif;
    color: white;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    writing-mode: vertical-rl; 
    opacity: 0.6;
  }

</style>
</head>
<body>

  <header>
    <div class="logo"></div>
    <h1>EXPANDED</h1>
  </header>

  <div id="scene">
  </div>

  <div class="zoom-control-container">
    <div class="slider-wrapper">
      <input type="range" id="zoom-lever" min="-2000" max="1500" value="-2000" step="10">
    </div>
    <span class="zoom-label">ZOOM</span>
  </div>

<script>
  const scene = document.getElementById('scene');
  const totalCurators = 16;
  const nodes = [];

  function generateNetwork3D() {
    for (let i = 0; i < totalCurators; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 800 + (Math.random() * 600); 
      const y = (Math.random() - 0.5) * 800; 

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      
      nodes.push({ id: i + 1, x: x, y: y, z: z });

      const wrapperDiv = document.createElement('div');
      wrapperDiv.classList.add('node-wrapper');
      wrapperDiv.id = `node-${i}`;
      
      const nodeDiv = document.createElement('div');
      nodeDiv.classList.add('node');

      const labelDiv = document.createElement('div');
      labelDiv.classList.add('label');
      labelDiv.textContent = `Curator ${i + 1}`;
      
      wrapperDiv.appendChild(nodeDiv);
      wrapperDiv.appendChild(labelDiv);

      wrapperDiv.addEventListener('mousedown', e => e.stopPropagation()); 
      wrapperDiv.addEventListener('click', () => {
        alert(`Curator ${i + 1}의 전시 공간으로 이동합니다.`);
      });

      scene.appendChild(wrapperDiv);
    }

    for (let i = 0; i < totalCurators; i++) {
      const target1 = (i + 1) % totalCurators;
      const target2 = (i + 4) % totalCurators; 
      
      drawLine3D(nodes[i], nodes[target1]);
      drawLine3D(nodes[i], nodes[target2]);
    }
  }

  function drawLine3D(p1, p2) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const dz = p2.z - p1.z;
    const length = Math.hypot(dx, dy, dz);
    
    const cx = (p1.x + p2.x) / 2;
    const cy = (p1.y + p2.y) / 2;
    const cz = (p1.z + p2.z) / 2;

    const rotY = Math.atan2(-dz, dx) * (180 / Math.PI);
    const rotZ = Math.atan2(dy, Math.hypot(dx, dz)) * (180 / Math.PI);

    const line = document.createElement('div');
    line.classList.add('line3d');
    line.style.width = `${length}px`;
    line.style.transform = `translate3d(calc(-50% + ${cx}px), calc(-50% + ${cy}px), ${cz}px) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
    
    const plane1 = document.createElement('div');
    plane1.classList.add('plane');
    
    const plane2 = document.createElement('div');
    plane2.classList.add('plane', 'cross');

    line.appendChild(plane1);
    line.appendChild(plane2);
    
    scene.appendChild(line);
  }

  generateNetwork3D();

  let isDragging = false;
  let previousX = 0, previousY = 0;
  let rotationX = 15, rotationY = -20;
  
  const zoomLever = document.getElementById('zoom-lever');

  function updateTransform() {
    const zoomValue = zoomLever.value;

    scene.style.transform = `translateZ(${zoomValue}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
    
    nodes.forEach((p, i) => {
      const wrapperEl = document.getElementById(`node-${i}`);
      wrapperEl.style.transform = `translate3d(${p.x}px, ${p.y}px, ${p.z}px) rotateY(${-rotationY}deg) rotateX(${-rotationX}deg)`;
    });
  }

  updateTransform();

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('.zoom-control-container') || e.target.closest('.node-wrapper')) return;

    isDragging = true;
    previousX = e.clientX;
    previousY = e.clientY;
  });

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mouseleave', () => isDragging = false);

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    const deltaX = e.clientX - previousX;
    const deltaY = e.clientY - previousY;

    rotationY += deltaX * 0.3; 
    rotationX -= deltaY * 0.3;

    rotationX = Math.max(-80, Math.min(80, rotationX));

    updateTransform();

    previousX = e.clientX;
    previousY = e.clientY;
  });

  zoomLever.addEventListener('input', updateTransform);

</script>
</body>
</html>
