<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED 3D Network</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F; 
    --neon-pink-dim: rgba(255, 0, 127, 0.4);
  }

  body {
    margin: 0; overflow: hidden; background-color: var(--bg-color); color: white;
    font-family: 'Space Grotesk', sans-serif; perspective: 1200px; perspective-origin: 50% 55vh; 
  }

  header {
    position: absolute; top: 30px; left: 40px; right: 60px; 
    z-index: 10; pointer-events: none; display: flex; align-items: center; justify-content: space-between; 
  }
  .brand { display: flex; align-items: center; }
  .logo {
    width: 40px; height: 40px; background-color: transparent; border: 2px solid var(--neon-pink);
    border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center;
  }
  .logo::before {
    content: 'EP'; font-family: 'Syncopate', sans-serif; color: var(--neon-pink); font-size: 1.2rem; font-weight: 700;
  }
  h1 {
    font-family: 'Syncopate', sans-serif; color: var(--neon-pink); font-size: 2.5rem; margin: 0;
    text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 20px var(--neon-pink-dim); letter-spacing: 2px;
  }

  .top-menu { display: flex; gap: 40px; pointer-events: auto; }
  .menu-item {
    font-family: 'Syncopate', sans-serif; font-size: 1.5rem; color: rgba(255, 255, 255, 0.5);
    text-decoration: none; display: flex; align-items: flex-end; transition: color 0.3s, text-shadow 0.3s;
  }
  .menu-item.active, .menu-item:hover { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
  .menu-item .rest {
    font-size: 1rem; max-width: 0; opacity: 0; overflow: hidden; white-space: nowrap;
    transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease; letter-spacing: 2px; padding-bottom: 2px; 
  }
  .menu-item:hover .rest { max-width: 150px; opacity: 1; margin-left: 2px; }

  #scene {
    position: absolute; top: 55vh; left: 50vw; width: 0; height: 0; transform-style: preserve-3d; cursor: grab;
  }
  #scene:active { cursor: grabbing; }

  .line3d {
    position: absolute; top: 0; left: 0; height: 2px; 
    transform-style: preserve-3d; pointer-events: none; transform-origin: center center; 
  }
  .line3d .plane { position: absolute; width: 100%; height: 100%; background-color: var(--neon-pink); opacity: 0.6; }
  .line3d .plane.cross { transform: rotateX(90deg); }

  .node-wrapper {
    position: absolute; top: 0; left: 0; width: 0; height: 0; transform-style: preserve-3d; z-index: 2;
  }

  .node {
    position: absolute; width: 100px; height: 100px; background-color: var(--bg-color);
    border: 8px solid var(--neon-pink); border-radius: 50%; 
    transform: translate(-50%, -50%) scale(0.26); 
    cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1); display: flex; align-items: center; justify-content: center;
  }
  .node::after {
    content: ''; width: 30px; height: 30px; background-color: var(--neon-pink); border-radius: 50%; transition: all 0.3s ease;
  }
  .node-wrapper:hover .node, .node.active-highlight {
    transform: translate(-50%, -50%) scale(0.52); 
    background-color: var(--neon-pink); border-color: #fff;
    box-shadow: 0 0 100px var(--neon-pink), 0 0 30px white; z-index: 10;
  }
  .node-wrapper:hover .node::after, .node.active-highlight::after { background-color: var(--bg-color); }

  .label {
    position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem;
    white-space: nowrap; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.9); font-weight: 700;
  }
  .node-wrapper:hover .label, .node-wrapper.active-wrapper .label { opacity: 1; color: var(--neon-pink); }

  #curator-list {
    position: fixed; right: 40px; top: 50vh; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; text-align: right;
  }
  .list-item {
    color: rgba(255, 255, 255, 0.4); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px;
    cursor: pointer; transition: all 0.3s ease; padding: 5px 0; position: relative;
  }
  .list-item:hover, .list-item.active { color: var(--neon-pink); transform: translateX(-10px); }
  .list-item::after {
    content: ''; position: absolute; right: -15px; top: 50%; transform: translateY(-50%); width: 0px; height: 2px;
    background-color: var(--neon-pink); transition: width 0.3s ease;
  }
  .list-item:hover::after, .list-item.active::after { width: 10px; }

</style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="logo"></div>
      <h1>EXPANDED</h1>
    </div>
    <nav class="top-menu">
      <a href="#" class="menu-item active">A<span class="rest">CTIVITY</span></a>
      <a href="#" class="menu-item">A<span class="rest">RCHIVE</span></a>
      <a href="#" class="menu-item">A<span class="rest">BOUT</span></a>
    </nav>
  </header>

  <div id="scene"></div>
  <div id="curator-list"></div>

<script>
  const scene = document.getElementById('scene');
  const curatorList = document.getElementById('curator-list');
  const totalCurators = 16;
  const nodes = []; 

  function generateNetwork3D() {
    for (let i = 0; i < totalCurators; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 600 + (Math.random() * 400); 
      const y = (Math.random() - 0.5) * 800; 

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      
      nodes.push({ id: i, x: x, y: y, z: z });

      const wrapperDiv = document.createElement('div');
      wrapperDiv.classList.add('node-wrapper');
      wrapperDiv.id = `node-${i}`;
      
      const nodeDiv = document.createElement('div');
      nodeDiv.classList.add('node');

      const labelDiv = document.createElement('div');
      labelDiv.classList.add('label');
      labelDiv.textContent = `Curator ${i + 1}`;
      
      wrapperDiv.appendChild(nodeDiv);
      wrapperDiv.appendChild(labelDiv);
      wrapperDiv.addEventListener('mousedown', e => e.stopPropagation()); 
      scene.appendChild(wrapperDiv);

      const listItem = document.createElement('div');
      listItem.className = 'list-item';
      listItem.textContent = `CURATOR ${i + 1}`;
      
      listItem.addEventListener('mouseenter', () => {
        nodeDiv.classList.add('active-highlight');
        wrapperDiv.classList.add('active-wrapper');
      });

      listItem.addEventListener('mouseleave', () => {
        nodeDiv.classList.remove('active-highlight');
        wrapperDiv.classList.remove('active-wrapper');
      });

      // [핵심 변경] 클릭 시 다른 HTML 페이지로 링크 이동
      const targetUrl = `curator_${i + 1}.html`;
      const goToPage = () => { window.location.href = targetUrl; };
      
      wrapperDiv.addEventListener('click', goToPage);
      listItem.addEventListener('click', goToPage);
      
      curatorList.appendChild(listItem);
    }

    for (let i = 0; i < totalCurators; i++) {
      const target1 = (i + 1) % totalCurators;
      const target2 = (i + 4) % totalCurators; 
      drawLine3D(nodes[i], nodes[target1]);
      drawLine3D(nodes[i], nodes[target2]);
    }
  }

  function drawLine3D(p1, p2) {
    const dx = p2.x - p1.x; const dy = p2.y - p1.y; const dz = p2.z - p1.z;
    const length = Math.hypot(dx, dy, dz);
    const cx = (p1.x + p2.x) / 2; const cy = (p1.y + p2.y) / 2; const cz = (p1.z + p2.z) / 2;
    const rotY = Math.atan2(-dz, dx) * (180 / Math.PI);
    const rotZ = Math.atan2(dy, Math.hypot(dx, dz)) * (180 / Math.PI);

    const line = document.createElement('div');
    line.classList.add('line3d');
    line.style.width = `${length}px`;
    line.style.transform = `translate3d(calc(-50% + ${cx}px), calc(-50% + ${cy}px), ${cz}px) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
    
    const plane1 = document.createElement('div'); plane1.classList.add('plane');
    const plane2 = document.createElement('div'); plane2.classList.add('plane', 'cross');

    line.appendChild(plane1); line.appendChild(plane2);
    scene.appendChild(line);
  }

  generateNetwork3D();

  let isDragging = false;
  let previousX = 0, previousY = 0;
  let rotationX = 20, rotationY = -30;
  
  let currentZoom = -500;
  const MIN_ZOOM = -3000; const MAX_ZOOM = 1000; const ZOOM_SPEED = 1.5; 

  function updateTransform() {
    scene.style.transform = `translateZ(${currentZoom}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
    
    nodes.forEach((p, i) => {
      const wrapperEl = document.getElementById(`node-${i}`);
      if(wrapperEl) {
          wrapperEl.style.transform = `translate3d(${p.x}px, ${p.y}px, ${p.z}px) rotateY(${-rotationY}deg) rotateX(${-rotationX}deg)`;
      }
    });
  }

  updateTransform();

  window.addEventListener('wheel', (e) => {
    currentZoom -= e.deltaY * ZOOM_SPEED;
    currentZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, currentZoom));
    updateTransform();
  });

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node-wrapper') || e.target.closest('#curator-list') || e.target.closest('.top-menu')) return;
    isDragging = true;
    previousX = e.clientX; previousY = e.clientY;
  });

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mouseleave', () => isDragging = false);

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - previousX; const deltaY = e.clientY - previousY;
    rotationY += deltaX * 0.3; rotationX -= deltaY * 0.3;
    rotationX = Math.max(-80, Math.min(80, rotationX));
    updateTransform();
    previousX = e.clientX; previousY = e.clientY;
  });

</script>
</body>
</html>
