<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED 3D Network (Organic Connections)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F;
    --neon-pink-dim: rgba(255, 0, 127, 0.4);
  }

  body {
    margin: 0;
    overflow: hidden; 
    background-color: var(--bg-color);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    perspective: 1200px; 
    perspective-origin: 50% 55vh; 
  }

  header {
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  .logo {
    width: 40px;
    height: 40px;
    background-color: transparent;
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    margin-right: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .logo::before {
    content: 'EP';
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 1.2rem;
    font-weight: 700;
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 2.5rem;
    margin: 0;
    text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 20px var(--neon-pink-dim);
    letter-spacing: 2px;
  }

  #scene {
    position: absolute;
    top: 55vh;  
    left: 50vw; 
    width: 0;
    height: 0;
    transform-style: preserve-3d;
    cursor: grab;
  }

  #scene:active {
    cursor: grabbing;
  }

  .line3d {
    position: absolute;
    top: 0;
    left: 0;
    height: 2px; 
    transform-style: preserve-3d;
    pointer-events: none;
    transform-origin: center center;
  }

  .line3d .plane {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: var(--neon-pink);
    opacity: 0.6; 
  }
  .line3d .plane.cross {
    transform: rotateX(90deg); 
  }

  .node-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    transform-style: preserve-3d;
    z-index: 2;
  }

  .node {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: var(--bg-color);
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    transform: translate(-50%, -50%); 
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1); 
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .node::after {
    content: '';
    width: 6px;
    height: 6px;
    background-color: var(--neon-pink);
    border-radius: 50%;
    transition: all 0.3s ease;
  }

  .node-wrapper:hover .node, .node.active-highlight {
    transform: translate(-50%, -50%) scale(2);
    background-color: var(--neon-pink);
    border-color: #fff;
    box-shadow: 0 0 40px var(--neon-pink), 0 0 15px white; 
    z-index: 10;
  }

  .node-wrapper:hover .node::after, .node.active-highlight::after {
    background-color: var(--bg-color);
  }

  .label {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 0.85rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    font-weight: 700;
  }

  .node-wrapper:hover .label, .node-wrapper.active-wrapper .label {
    opacity: 1;
    color: var(--neon-pink);
  }

  #curator-list {
    position: fixed;
    right: 40px;
    top: 50vh;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
    text-align: right;
  }

  .list-item {
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 5px 0;
    position: relative;
  }

  .list-item:hover, .list-item.active {
    color: var(--neon-pink);
    transform: translateX(-10px);
  }

  .list-item::after {
    content: '';
    position: absolute;
    right: -15px;
    top: 50%;
    transform: translateY(-50%);
    width: 0px;
    height: 2px;
    background-color: var(--neon-pink);
    transition: width 0.3s ease;
  }

  .list-item:hover::after, .list-item.active::after {
    width: 10px;
  }

</style>
</head>
<body>

  <header>
    <div class="logo"></div>
    <h1>EXPANDED</h1>
  </header>

  <div id="scene"></div>

  <div id="curator-list"></div>

<script>
  const scene = document.getElementById('scene');
  const curatorList = document.getElementById('curator-list');
  const totalCurators = 16;
  const nodes = [];

  function generateNetwork3D() {
    // 1. 노드 생성
    for (let i = 0; i < totalCurators; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 600 + (Math.random() * 400); 
      // [수정] 세로축(Y) 범위를 400에서 800으로 늘려 위아래로 더 퍼지게 함
      const y = (Math.random() - 0.5) * 800; 

      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      
      nodes.push({ id: i + 1, x: x, y: y, z: z });

      const wrapperDiv = document.createElement('div');
      wrapperDiv.classList.add('node-wrapper');
      wrapperDiv.id = `node-${i}`;
      
      const nodeDiv = document.createElement('div');
      nodeDiv.classList.add('node');

      const labelDiv = document.createElement('div');
      labelDiv.classList.add('label');
      labelDiv.textContent = `Curator ${i + 1}`;
      
      wrapperDiv.appendChild(nodeDiv);
      wrapperDiv.appendChild(labelDiv);

      wrapperDiv.addEventListener('mousedown', e => e.stopPropagation()); 
      scene.appendChild(wrapperDiv);

      const listItem = document.createElement('div');
      listItem.className = 'list-item';
      listItem.textContent = `CURATOR ${i + 1}`;
      
      listItem.addEventListener('mouseenter', () => {
        nodeDiv.classList.add('active-highlight');
        wrapperDiv.classList.add('active-wrapper');
      });

      listItem.addEventListener('mouseleave', () => {
        nodeDiv.classList.remove('active-highlight');
        wrapperDiv.classList.remove('active-wrapper');
      });

      listItem.addEventListener('click', () => {
        centerNode(i);
      });

      curatorList.appendChild(listItem);
    }

    // 2. 연결 로직 [수정] - 가장 가까운 이웃 3개와 연결 (거미줄처럼 매끄럽게)
    const drawnLines = new Set(); // 중복 선 방지용

    for (let i = 0; i < totalCurators; i++) {
      const nodeA = nodes[i];
      
      // A노드와 다른 모든 노드들 간의 거리를 계산
      const distances = nodes.map((nodeB, index) => {
        if (i === index) return { index, dist: Infinity }; // 자기 자신 제외
        const dx = nodeA.x - nodeB.x;
        const dy = nodeA.y - nodeB.y;
        const dz = nodeA.z - nodeB.z;
        return { index, dist: Math.hypot(dx, dy, dz) };
      });

      // 거리가 가까운 순으로 정렬
      distances.sort((a, b) => a.dist - b.dist);

      // 가장 가까운 3개의 노드와 선 연결
      for (let j = 0; j < 3; j++) {
        const targetIndex = distances[j].index;
        const nodeB = nodes[targetIndex];
        
        const minId = Math.min(nodeA.id, nodeB.id);
        const maxId = Math.max(nodeA.id, nodeB.id);
        const lineId = `${minId}-${maxId}`;

        if (!drawnLines.has(lineId)) {
          drawnLines.add(lineId);
          drawLine3D(nodeA, nodeB);
        }
      }
    }
  }

  function drawLine3D(p1, p2) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const dz = p2.z - p1.z;
    const length = Math.hypot(dx, dy, dz);
    
    const cx = (p1.x + p2.x) / 2;
    const cy = (p1.y + p2.y) / 2;
    const cz = (p1.z + p2.z) / 2;

    const rotY = Math.atan2(-dz, dx) * (180 / Math.PI);
    const rotZ = Math.atan2(dy, Math.hypot(dx, dz)) * (180 / Math.PI);

    const line = document.createElement('div');
    line.classList.add('line3d');
    line.style.width = `${length}px`;
    line.style.transform = `translate3d(calc(-50% + ${cx}px), calc(-50% + ${cy}px), ${cz}px) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
    
    const plane1 = document.createElement('div');
    plane1.classList.add('plane');
    const plane2 = document.createElement('div');
    plane2.classList.add('plane', 'cross');

    line.appendChild(plane1);
    line.appendChild(plane2);
    scene.appendChild(line);
  }

  generateNetwork3D();

  // --- 카메라 제어 변수 ---
  let isDragging = false;
  let previousX = 0, previousY = 0;
  let rotationX = 20, rotationY = -30;
  
  let currentZoom = -1200;
  const MIN_ZOOM = -2500;
  const MAX_ZOOM = 1000;
  const ZOOM_SPEED = 1.5; 

  let isAutoRotating = false;
  let targetRotX = null;
  let targetRotY = null;

  function updateTransform() {
    scene.style.transform = `translateZ(${currentZoom}px) rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
    
    nodes.forEach((p, i) => {
      const wrapperEl = document.getElementById(`node-${i}`);
      wrapperEl.style.transform = `translate3d(${p.x}px, ${p.y}px, ${p.z}px) rotateY(${-rotationY}deg) rotateX(${-rotationX}deg)`;
    });
  }

  updateTransform();

  function centerNode(nodeIndex) {
    const node = nodes[nodeIndex];
    let targetY = -Math.atan2(node.x, node.z) * (180 / Math.PI);
    let targetX = Math.atan2(node.y, Math.hypot(node.x, node.z)) * (180 / Math.PI);

    let currentY = rotationY % 360;
    if (currentY < 0) currentY += 360; 
    let ty = targetY % 360;
    if (ty < 0) ty += 360;

    let diffY = ty - currentY;
    if (diffY > 180) diffY -= 360;
    if (diffY < -180) diffY += 360;

    targetRotY = rotationY + diffY;
    targetRotX = targetX;

    isAutoRotating = true;
    animateRotation();
  }

  function animateRotation() {
    if (!isAutoRotating) return;

    rotationX += (targetRotX - rotationX) * 0.08;
    rotationY += (targetRotY - rotationY) * 0.08;

    updateTransform();

    if (Math.abs(targetRotX - rotationX) < 0.1 && Math.abs(targetRotY - rotationY) < 0.1) {
      isAutoRotating = false;
    } else {
      requestAnimationFrame(animateRotation);
    }
  }

  window.addEventListener('wheel', (e) => {
    isAutoRotating = false; 
    currentZoom -= e.deltaY * ZOOM_SPEED;
    currentZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, currentZoom));
    updateTransform();
  });

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node-wrapper') || e.target.closest('#curator-list')) return;
    
    isAutoRotating = false; 
    isDragging = true;
    previousX = e.clientX;
    previousY = e.clientY;
  });

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mouseleave', () => isDragging = false);

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    const deltaX = e.clientX - previousX;
    const deltaY = e.clientY - previousY;

    rotationY += deltaX * 0.3; 
    rotationX -= deltaY * 0.3;
    rotationX = Math.max(-80, Math.min(80, rotationX));

    updateTransform();

    previousX = e.clientX;
    previousY = e.clientY;
  });

</script>
</body>
</html>
