<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPANDED Curation Network</title>
<style>
  /* 사이버펑크/네온 감성에 어울리는 폰트 임포트 */
  @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --bg-color: #050505;
    --neon-pink: #FF007F;
    --neon-pink-dim: rgba(255, 0, 127, 0.3);
  }

 body {
    margin: 0;
    overflow: hidden;
    background-color: var(--bg-color);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    /* 3D 원근감 부여 (숫자가 작을수록 왜곡이 심해짐) */
    perspective: 1200px; 
  }
  
  header {
    position: absolute;
    top: 30px;
    left: 40px;
    z-index: 10;
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    color: var(--neon-pink);
    font-size: 2.5rem;
    margin: 0;
    text-shadow: 0 0 10px var(--neon-pink-dim), 0 0 20px var(--neon-pink-dim);
    letter-spacing: 2px;
  }

#network-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    /* 자식 요소들의 3D 속성 유지 */
    transform-style: preserve-3d; 
    /* 처음 화면을 켰을 때 약간 기울어져 있도록 기본값 설정 */
    transform: rotateX(20deg) rotateY(-15deg); 
    /* 마우스 커서 모양 변경 */
    cursor: grab; 
  }
  
  #network-container:active {
    cursor: grabbing;
  }

  line {
    stroke: var(--neon-pink);
    stroke-width: 1.5;
    opacity: 0.3;
    transition: opacity 0.3s;
  }

  /* 큐레이터 노드 (클릭 가능한 원) */
  .node {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: var(--bg-color);
    border: 2px solid var(--neon-pink);
    border-radius: 50%;
    transform: translate(-50%, -50%); /* 중심점 정렬 */
    z-index: 2;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 12px var(--neon-pink-dim);
  }

  /* 노드 내부의 작은 점 */
  .node::after {
    content: '';
    width: 6px;
    height: 6px;
    background-color: var(--neon-pink);
    border-radius: 50%;
    transition: all 0.3s ease;
  }

  /* 마우스 오버 시 네온 효과 극대화 */
  .node:hover {
    transform: translate(-50%, -50%) scale(1.6);
    background-color: var(--neon-pink);
    box-shadow: 0 0 25px var(--neon-pink);
  }

  .node:hover::after {
    background-color: var(--bg-color);
  }

  /* 큐레이터 이름 툴팁 */
  .label {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 0.85rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    font-weight: 700;
  }

  .node:hover .label {
    opacity: 1;
  }
</style>
</head>
<body>

  <header>
    <h1>EXPANDED</h1>
  </header>

  <div id="network-container">
    <svg id="network-lines"></svg>
    </div>

<script>
  const container = document.getElementById('network-container');
  const svgLines = document.getElementById('network-lines');
  const totalCurators = 16;
  const nodes = [];

  // 화면 내에 노드들을 흩뿌려주는 함수
  function generateNetwork() {
    let svgHTML = '';

    // 1. 16개의 노드 좌표 생성 및 HTML 요소 추가
    for (let i = 0; i < totalCurators; i++) {
      // 화면 중앙 70% 영역 내에 퍼지도록 퍼센트(%)로 좌표 계산
      const x = 15 + Math.random() * 70; 
      const y = 20 + Math.random() * 60;
      
      nodes.push({ id: i + 1, x: x, y: y });

      const nodeDiv = document.createElement('div');
      nodeDiv.classList.add('node');
      nodeDiv.style.left = `${x}%`;
      nodeDiv.style.top = `${y}%`;

      const labelDiv = document.createElement('div');
      labelDiv.classList.add('label');
      labelDiv.textContent = `Curator ${i + 1}`;
      nodeDiv.appendChild(labelDiv);

      // 개별 큐레이터 클릭 이벤트
      nodeDiv.addEventListener('click', () => {
        alert(`Curator ${i + 1}의 전시 공간으로 이동합니다.`);
      });

      container.appendChild(nodeDiv);
    }

    // 2. 노드들을 선으로 연결하여 망(Web) 구성
    // 각 노드를 다른 2개의 노드와 연결해 복잡한 네트워크 형태를 만듭니다.
    for (let i = 0; i < totalCurators; i++) {
      const target1 = (i + 1) % totalCurators;
      const target2 = (i + 4) % totalCurators; 
      
      svgHTML += `<line x1="${nodes[i].x}%" y1="${nodes[i].y}%" x2="${nodes[target1].x}%" y2="${nodes[target1].y}%" />`;
      svgHTML += `<line x1="${nodes[i].x}%" y1="${nodes[i].y}%" x2="${nodes[target2].x}%" y2="${nodes[target2].y}%" />`;
    }

    svgLines.innerHTML = svgHTML;
  }

  // 실행
  generateNetwork();
  // 실행
  generateNetworkOptimized();

  // --- 3D 마우스 회전(드래그) 로직 ---
  let isDragging = false;
  let previousX = 0;
  let previousY = 0;
  
  // 초기 CSS에 설정한 transform 값과 동일하게 시작
  let rotationX = 20; 
  let rotationY = -15;

  // 1. 마우스를 누를 때 (드래그 시작)
  document.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousX = e.clientX;
    previousY = e.clientY;
  });

  // 2. 마우스를 뗄 때 (드래그 종료)
  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // 3. 마우스가 화면 밖으로 나갈 때 (드래그 강제 종료)
  document.addEventListener('mouseleave', () => {
    isDragging = false;
  });

  // 4. 마우스를 움직일 때 (화면 회전)
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    // 마우스가 이동한 거리 계산
    const deltaX = e.clientX - previousX;
    const deltaY = e.clientY - previousY;

    // 이동 거리에 비례하여 회전각 계산 (0.3은 마우스 감도, 취향껏 조절 가능)
    rotationY += deltaX * 0.3; 
    rotationX -= deltaY * 0.3; // X축 회전은 마우스 Y축 이동과 반대로 움직여야 자연스러움

    // 화면이 완전히 뒤집히지 않도록 X축(위아래) 회전 각도 제한 (-80도 ~ 80도)
    rotationX = Math.max(-80, Math.min(80, rotationX));

    // 컨테이너에 회전값 적용
    container.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;

    // 현재 위치를 다음 계산을 위해 저장
    previousX = e.clientX;
    previousY = e.clientY;
  });
</script>

</body>
</html>
