<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPANDED | Neon Frontiers</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/DepthOfFieldShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/DepthOfFieldPass.js"></script>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>

    <header>
        <img src="logo.png" alt="EP Logo" class="logo">
        <h1 class="title">EXPANDED</h1>
    </header>

    <div id="info-panel" class="info-panel hidden">
        <div class="info-header">
            <span class="info-label">CURATOR:</span>
            <span id="curator-name" class="info-value">JAKE LEE</span>
        </div>
        <div class="info-theme">
            <span class="info-label">THEME:</span>
            <span id="theme-name" class="info-value">"NEON FRONTIERS"</span>
        </div>
        <div class="info-status">
            <span class="info-label">STATUS:</span>
            <span class="info-value live">LIVE</span>
        </div>
        <div class="info-preview">
            <div class="preview-box"></div>
        </div>
    </div>

    <footer>
        <nav>
            <ul>
                <li><a href="#" class="nav-link">HOME</a></li>
                <li><a href="#" class="nav-link active">CURATIONS</a></li>
                <li><a href="#" class="nav-link">COLLECTIVE</a></li>
                <li><a href="#" class="nav-link">CONTACT</a></li>
            </ul>
        </nav>
    </footer>

    <script src="script.js"></script>
</body>
</html>
